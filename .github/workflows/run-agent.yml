name: Run Nezha Agent

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install and run Nezha Agent
        run: |
          curl -L https://raw.githubusercontent.com/nezhahq/scripts/main/agent/install.sh -o agent.sh && \
          chmod +x agent.sh && \
          env NZ_SERVER=148.100.76.192:8315 NZ_TLS=false NZ_CLIENT_SECRET=U3PkMuBhSmK4jFwTu7OHYcUxYwI7HtaF ./agent.sh

      - name: Keep runner alive for 5h50m
        run: |
          echo "Starting 5 hours 50 minutes wait..."
          sleep 20999
          echo "Wait completed"

      - name: Trigger next workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: continue-workflow
          repository: ${{ github.repository }}