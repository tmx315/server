name: 每日自动签到

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpangocairo-1.0-0 libpango-1.0-0 libcairo2 libatspi2.0-0 libx11-xcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0
      
      - name: 安装 Playwright
        run: pip install playwright
      
      - name: 安装浏览器
        run: python -m playwright install chromium
      
      - name: 运行签到脚本
        env:
          USERS: ${{ secrets.USERS }}
        run: python signin.py
