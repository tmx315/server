name: Continue Workflow

on:
  repository_dispatch:
    types: [continue-workflow]
  workflow_dispatch:

jobs:
  continue-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Continue execution
        run: |
          echo "Continuing workflow after previous agent completed"
          echo "This is the continuation job running after 5h50m wait"